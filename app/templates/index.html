<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI PR Review 助手</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-elev2: #1c2230;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #2f81f7;
      --accent-hover: #4493f8;
      --crit: #f85149;
      --high: #ff8c42;
      --med: #d29922;
      --low: #3fb950;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px 80px; }

    /* Banner */
    .banner {
      text-align: center;
      padding: 56px 20px 40px;
      background: radial-gradient(1200px 400px at 50% -120px, rgba(47,129,247,.18), transparent);
      border-bottom: 1px solid var(--border);
    }
    .banner h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: .5px;
      background: linear-gradient(90deg, #58a6ff, #a371f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .banner p { margin: 10px 0 0; color: var(--text-dim); font-size: 15px; }

    /* Cards */
    .card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .input-card { margin-top: 32px; }
    .row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1; min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,129,247,.25);
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:disabled { opacity: .55; cursor: not-allowed; }
    .opts {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 14px; flex-wrap: wrap;
    }
    .check {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-dim); font-size: 14px; user-select: none;
    }
    .check input { width: 16px; height: 16px; accent-color: var(--accent); }
    button.link {
      background: none; border: none; color: var(--accent);
      font-size: 13px; cursor: pointer; padding: 0;
    }
    button.link:hover { text-decoration: underline; }

    /* Loading */
    .loading {
      display: none; align-items: center; gap: 14px;
      margin-top: 28px; color: var(--text-dim);
    }
    .loading.show { display: flex; }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error {
      display: none; margin-top: 24px; padding: 14px 16px; border-radius: 8px;
      background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.4);
      color: #ffb4ae; font-size: 14px; white-space: pre-wrap;
    }
    .error.show { display: block; }

    /* Results */
    #results { margin-top: 28px; display: none; }
    #results.show { display: block; }

    .score-card { display: flex; gap: 22px; align-items: center; }
    .score {
      flex: 0 0 auto; width: 104px; height: 104px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 4px solid var(--accent); font-weight: 700;
    }
    .score .num { font-size: 34px; line-height: 1; }
    .score .max { font-size: 12px; color: var(--text-dim); }
    .score-meta { flex: 1; min-width: 0; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .badge {
      font-size: 12px; padding: 3px 10px; border-radius: 999px;
      background: var(--bg-elev2); border: 1px solid var(--border); color: var(--text-dim);
    }
    .summary { color: var(--text); font-size: 14.5px; white-space: pre-wrap; }

    /* Action bar */
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg-elev2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 14px;
      font-size: 13px; cursor: pointer; text-decoration: none; transition: border-color .15s;
    }
    .btn:hover { border-color: var(--accent); }
    .md-view {
      display: none; margin-top: 12px; max-height: 360px; overflow: auto;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px; color: var(--text); white-space: pre-wrap; word-break: break-word;
    }
    .md-view.show { display: block; }

    .comment-link {
      margin-top: 16px; padding: 12px 16px; border-radius: 8px;
      background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.35); font-size: 14px;
    }
    .comment-link a { color: var(--low); }

    .section-title {
      margin: 30px 0 14px; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .count {
      font-size: 12px; color: var(--text-dim);
      background: var(--bg-elev2); border: 1px solid var(--border);
      border-radius: 999px; padding: 1px 9px;
    }
    .section-title .hint { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: auto; }

    /* Risk cards (collapsible) */
    .risk {
      border: 1px solid var(--border); border-left-width: 4px; border-radius: 10px;
      background: var(--bg-elev); margin-bottom: 12px; overflow: hidden;
    }
    .risk.critical { border-left-color: var(--crit); }
    .risk.high { border-left-color: var(--high); }
    .risk.medium { border-left-color: var(--med); }
    .risk.low { border-left-color: var(--low); }
    .risk-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 13px 16px; cursor: pointer; user-select: none;
    }
    .chevron {
      margin-left: auto; color: var(--text-dim); transition: transform .2s; flex: 0 0 auto;
    }
    .risk.collapsed .chevron { transform: rotate(-90deg); }
    .sev {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; padding: 2px 9px; border-radius: 6px; flex: 0 0 auto;
    }
    .sev.critical { background: rgba(248,81,73,.16); color: var(--crit); }
    .sev.high { background: rgba(255,140,66,.16); color: var(--high); }
    .sev.medium { background: rgba(210,153,34,.16); color: var(--med); }
    .sev.low { background: rgba(63,185,80,.16); color: var(--low); }
    .type-tag {
      font-size: 11px; padding: 2px 9px; border-radius: 6px;
      background: var(--bg-elev2); border: 1px solid var(--border); color: var(--text-dim); flex: 0 0 auto;
    }
    .loc {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px; color: var(--accent); word-break: break-all;
    }
    .risk-body { padding: 0 16px 14px; }
    .risk.collapsed .risk-body { display: none; }
    .risk-desc { font-size: 14px; margin: 4px 0; }
    .risk-sug {
      font-size: 13.5px; color: var(--text-dim);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-top: 8px; white-space: pre-wrap;
    }
    .risk-sug b { color: var(--low); font-weight: 600; }

    .no-risk {
      text-align: center; padding: 24px; color: var(--low);
      border: 1px dashed var(--border); border-radius: 10px; background: var(--bg-elev);
    }
    footer { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 48px; }
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--bg-elev2); border: 1px solid var(--border); color: var(--text);
      padding: 10px 18px; border-radius: 8px; font-size: 14px; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    a { color: var(--accent); }

    /* Mobile */
    @media (max-width: 600px) {
      .banner { padding: 40px 16px 28px; }
      .banner h1 { font-size: 26px; }
      .banner p { font-size: 13px; }
      .wrap { padding: 0 14px 60px; }
      .row { flex-direction: column; }
      button.primary { padding: 12px; width: 100%; }
      .score-card { flex-direction: column; text-align: center; }
      .badges { justify-content: center; }
      .section-title .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="banner">
    <h1>AI PR Review 助手</h1>
    <p>七牛云 × XEngineer 暑期实训营 · 题目三</p>
  </div>

  <div class="wrap">
    <div class="card input-card">
      <div class="row">
        <input id="pr-url" type="text"
               placeholder="https://github.com/owner/repo/pull/123"
               autocomplete="off" spellcheck="false" />
        <button id="go" class="primary">开始审查</button>
      </div>
      <div class="opts">
        <label class="check">
          <input id="post-comment" type="checkbox" />
          审查后发评论到 PR
        </label>
        <button id="example" class="link" type="button">填入示例 PR</button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span id="loading-text">正在拉取 PR diff…</span>
    </div>

    <div id="error" class="error"></div>

    <div id="results">
      <div class="card score-card">
        <div id="score" class="score">
          <span class="num" id="score-num">--</span>
          <span class="max">/ 100</span>
        </div>
        <div class="score-meta">
          <div class="badges">
            <span class="badge" id="badge-provider"></span>
            <span class="badge" id="badge-pr"></span>
          </div>
          <div class="summary" id="summary"></div>
          <div class="actions">
            <button id="copy-md" class="btn">📋 复制 Markdown 报告</button>
            <button id="toggle-md" class="btn">📄 查看 Markdown</button>
            <a id="gh-link" class="btn" target="_blank" rel="noopener">🔗 在 GitHub 查看 PR</a>
          </div>
          <pre id="md-view" class="md-view"></pre>
        </div>
      </div>

      <div id="comment-box" class="comment-link" style="display:none"></div>

      <div class="section-title">
        风险点 <span class="count" id="risk-count">0</span>
        <span class="hint">点击卡片可折叠/展开</span>
      </div>
      <div id="risk-list"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <footer>Powered by FastAPI · DeepSeek / Claude · PyGithub</footer>

  <script>
    const $ = (id) => document.getElementById(id);
    const SEV_CN = { critical: "严重", high: "高", medium: "中", low: "低" };
    const EXAMPLE_PR = "https://github.com/PyGithub/PyGithub/pull/2787";
    const TIMEOUT_MS = 120000;

    const btn = $("go");
    const urlInput = $("pr-url");
    let providerName = "模型";
    let stageTimers = [];
    let currentMarkdown = "";

    // 加载当前 LLM 厂商名（用于分阶段提示）
    fetch("/config").then(r => r.json()).then(d => {
      if (d && d.provider) {
        providerName = d.provider.charAt(0).toUpperCase() + d.provider.slice(1)
          .replace("seek", "Seek"); // deepseek -> DeepSeek
      }
    }).catch(() => {});

    function esc(s) {
      return (s ?? "").toString().replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function toast(msg) {
      const t = $("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1600);
    }

    function setStage(text) { $("loading-text").textContent = text; }
    function startStages() {
      setStage("📥 正在拉取 PR diff…");
      stageTimers.push(setTimeout(() => setStage(`🤖 正在调用 ${providerName} 审查…`), 2200));
      stageTimers.push(setTimeout(() => setStage(`🤖 ${providerName} 正在分析代码，请稍候…`), 12000));
    }
    function clearStages() { stageTimers.forEach(clearTimeout); stageTimers = []; }

    function setLoading(on) {
      $("loading").classList.toggle("show", on);
      btn.disabled = on;
      btn.textContent = on ? "审查中…" : "开始审查";
    }
    function showError(msg) {
      const e = $("error");
      e.textContent = "❌ " + msg;
      e.classList.add("show");
    }
    function clearOutputs() {
      $("error").classList.remove("show");
      $("results").classList.remove("show");
      $("md-view").classList.remove("show");
    }

    // 解析后端错误（HTTPException 的 detail 是字符串；422 校验错误是数组）
    function extractError(data, status) {
      const d = data && data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) return d.map(x => x.msg || JSON.stringify(x)).join("；");
      return `请求失败（HTTP ${status}）`;
    }

    function render(data) {
      $("score-num").textContent = data.overall_score;
      let scoreColor = "var(--low)";
      if (data.overall_score < 60) scoreColor = "var(--crit)";
      else if (data.overall_score < 75) scoreColor = "var(--high)";
      else if (data.overall_score < 90) scoreColor = "var(--med)";
      $("score").style.borderColor = scoreColor;
      $("score-num").style.color = scoreColor;

      $("badge-provider").textContent = `${data.provider} / ${data.model}`;
      $("badge-pr").textContent = `${data.repo} #${data.pr_number}`;
      $("summary").textContent = data.summary || "（无总体评价）";

      // markdown 复制 + GitHub 链接
      currentMarkdown = data.markdown || "";
      $("gh-link").href = `https://github.com/${data.repo}/pull/${data.pr_number}`;
      $("md-view").textContent = currentMarkdown;
      $("md-view").classList.remove("show");
      $("toggle-md").textContent = "📄 查看 Markdown";

      // 评论链接
      const cbox = $("comment-box");
      if (data.comment_url) {
        cbox.style.display = "block";
        cbox.innerHTML = `✅ 已发布评论到 PR：<a href="${esc(data.comment_url)}" target="_blank" rel="noopener">${esc(data.comment_url)}</a>`;
      } else {
        cbox.style.display = "none";
      }

      // 风险点（可折叠）
      const risks = data.risks || [];
      $("risk-count").textContent = risks.length;
      const list = $("risk-list");
      if (risks.length === 0) {
        list.innerHTML = `<div class="no-risk">✅ 未发现明显问题，代码质量良好</div>`;
      } else {
        list.innerHTML = risks.map((r) => {
          const sev = r.severity || "low";
          const loc = esc(r.file) + (r.line != null ? `:${r.line}` : "");
          const sug = r.suggestion
            ? `<div class="risk-sug"><b>建议：</b>${esc(r.suggestion)}</div>` : "";
          return `
            <div class="risk ${sev}">
              <div class="risk-head">
                <span class="sev ${sev}">${SEV_CN[sev] || sev}</span>
                <span class="type-tag">${esc(r.type)}</span>
                <span class="loc">${loc}</span>
                <span class="chevron">▾</span>
              </div>
              <div class="risk-body">
                <div class="risk-desc">${esc(r.description)}</div>
                ${sug}
              </div>
            </div>`;
        }).join("");
        // 绑定折叠
        list.querySelectorAll(".risk-head").forEach((h) => {
          h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed"));
        });
      }
      $("results").classList.add("show");
    }

    async function runReview() {
      const url = urlInput.value.trim();
      clearOutputs();
      if (!url) { showError("请输入 PR URL"); return; }

      setLoading(true);
      startStages();
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);

      try {
        const resp = await fetch("/review/url", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pr_url: url, post_comment: $("post-comment").checked }),
          signal: ctrl.signal,
        });
        let data = {};
        try { data = await resp.json(); } catch (_) {}
        if (!resp.ok) {
          showError(extractError(data, resp.status));
        } else {
          setStage("✅ 审查完成");
          render(data);
        }
      } catch (e) {
        if (e.name === "AbortError") {
          showError("审查超时（超过 120 秒）。该 PR 可能过大，请稍后重试或换一个更小的 PR。");
        } else {
          showError("网络错误：" + e.message);
        }
      } finally {
        clearTimeout(timer);
        clearStages();
        setLoading(false);
      }
    }

    btn.addEventListener("click", runReview);
    urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") runReview(); });
    $("example").addEventListener("click", () => {
      urlInput.value = EXAMPLE_PR; urlInput.focus();
    });
    $("toggle-md").addEventListener("click", () => {
      const v = $("md-view");
      const shown = v.classList.toggle("show");
      $("toggle-md").textContent = shown ? "📄 隐藏 Markdown" : "📄 查看 Markdown";
    });
    $("copy-md").addEventListener("click", async () => {
      if (!currentMarkdown) return;
      try {
        await navigator.clipboard.writeText(currentMarkdown);
        toast("已复制 Markdown 报告 ✅");
      } catch (_) {
        // 退化方案：选中 md-view 文本
        const v = $("md-view");
        v.classList.add("show");
        const range = document.createRange();
        range.selectNodeContents(v);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
        toast("已选中文本，请按 Ctrl/⌘+C 复制");
      }
    });
  </script>
</body>
</html>
