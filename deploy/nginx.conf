# 可选的 nginx 反向代理：把 80 端口转发到 app 容器的 8000。
# 启用：docker compose --profile with-nginx up -d
# 之后用 http://<服务器IP>/ 访问（无需带 :8000）。
server {
    listen 80;
    server_name _;

    # 上游为 compose 网络内的服务名 pr-review
    location / {
        proxy_pass http://pr-review:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大 PR 审查可能耗时较长（前端有 120s 超时），这里放宽到 180s
        proxy_connect_timeout 10s;
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
    }
}
