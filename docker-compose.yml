# 一键启动 PR Review 助手
# 用法：
#   1. cp .env.example .env  并填入真实密钥
#   2. docker compose up -d --build                      # 仅 app，访问 http://<IP>:8000
#   3.（可选）docker compose --profile with-nginx up -d  # app + nginx 反代，访问 http://<IP>/

services:
  pr-review:
    build: .
    image: qiniu-pr-review:latest
    container_name: pr-review
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # 资源限制：避免吃光 2GB 小内存机
    mem_limit: 1g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 可选的 nginx 反向代理（80 -> app:8000）。
  # 仅在显式启用 profile 时启动，默认 `docker compose up` 不会拉起它，
  # 因此不影响现有「仅 app」的部署方式。
  nginx:
    image: nginx:alpine
    container_name: pr-review-nginx
    profiles: ["with-nginx"]
    restart: unless-stopped
    depends_on:
      - pr-review
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
